<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL - Anonim Soru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">NGL SECURE</h1>
            <div class="mt-2 flex items-center justify-center gap-2 text-xs text-gray-400">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                Güvenli Bağlantı Aktif
            </div>
        </div>

        <div class="mb-4">
            <label class="text-xs font-semibold text-gray-400 ml-2 uppercase tracking-wider">Instagram Kullanıcı Adın</label>
            <input type="text" id="instaUser" placeholder="@kullaniciadi" 
                class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 mt-1 outline-none focus:border-purple-500 transition-all text-white">
            <p class="text-[10px] text-gray-500 mt-2 px-2 italic">
                * Sistem güvenliği için gereklidir. Mesaj attığınız kişi adınızı göremez.
            </p>
        </div>

        <div class="mb-6">
            <textarea id="userMsg" rows="4" placeholder="Buraya anonim mesajını yaz..." 
                class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-pink-500 transition-all text-white resize-none"></textarea>
        </div>

        <button onclick="veriyiGonder()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95">
            Anonim Gönder
        </button>

        <div id="status" class="hidden mt-4 text-center p-3 rounded-xl bg-green-500/20 text-green-400 text-sm">
            ✅ Mesajın şifrelenerek anonim olarak iletildi!
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
